<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroShop Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="Dashboard for E-Commerce Microservices">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>MicroShop</h1>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-tab="products">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path><line x1="16" y1="8" x2="2" y2="22"></line><line x1="17.5" y1="15" x2="9" y2="6.5"></line></svg>
                    Products
                </button>
                <button class="nav-btn" data-tab="customers">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Customers
                </button>
                <button class="nav-btn" data-tab="orders">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    Orders
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header class="topbar">
                <h2>Dashboard overview</h2>
                <div class="user-profile">
                    <div class="avatar">A</div>
                    <span>Admin</span>
                </div>
            </header>

            <div class="tab-container">
                
                <!-- Products Tab -->
                <section id="products-tab" class="tab-content active">
                    <div class="section-header">
                        <h3>Inventory Management</h3>
                        <button class="btn btn-primary" onclick="openModal('product-modal')">Add Product</button>
                    </div>
                    <div class="card-grid" id="products-list">
                        <!-- Products injected here -->
                    </div>
                </section>

                <!-- Customers Tab -->
                <section id="customers-tab" class="tab-content">
                    <div class="section-header">
                        <h3>Customer Base</h3>
                        <button class="btn btn-primary" onclick="openModal('customer-modal')">Add Customer</button>
                    </div>
                    <div class="list-layout" id="customers-list">
                        <!-- Customers injected here -->
                    </div>
                </section>

                <!-- Orders Tab -->
                <section id="orders-tab" class="tab-content">
                    <div class="section-header">
                        <h3>Order History</h3>
                        <button class="btn btn-primary" onclick="openModal('order-modal')">Create Order</button>
                    </div>
                    <div class="list-layout" id="orders-list">
                        <!-- Orders injected here -->
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Product</h3>
                <button class="close-btn" onclick="closeModal('product-modal')">×</button>
            </div>
            <form id="product-form" onsubmit="handleProductSubmit(event)">
                <div class="input-group">
                    <label>Product Name</label>
                    <input type="text" id="p-name" required placeholder="e.g. MacBook Pro">
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Price ($)</label>
                        <input type="number" id="p-price" required min="0" step="0.01" placeholder="99.99">
                    </div>
                    <div class="input-group">
                        <label>Initial Inventory</label>
                        <input type="number" id="p-inv" required min="0" placeholder="100">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full mt-4">Save Product</button>
            </form>
        </div>
    </div>

    <div id="customer-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Customer</h3>
                <button class="close-btn" onclick="closeModal('customer-modal')">×</button>
            </div>
            <form id="customer-form" onsubmit="handleCustomerSubmit(event)">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="c-name" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="c-email" required placeholder="john@example.com">
                </div>
                <div class="input-group">
                    <label>Address</label>
                    <input type="text" id="c-address" placeholder="123 Main St, City">
                </div>
                <button type="submit" class="btn btn-primary w-full mt-4">Save Customer</button>
            </form>
        </div>
    </div>

    <div id="order-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Create Order</h3>
                <button class="close-btn" onclick="closeModal('order-modal')">×</button>
            </div>
            <form id="order-form" onsubmit="handleOrderSubmit(event)">
                <div class="input-group">
                    <label>Select Customer</label>
                    <select id="o-customer" required>
                        <!-- populated by js -->
                    </select>
                </div>
                <div class="input-group">
                    <label>Select Product</label>
                    <select id="o-product" required onchange="updateOrderPrice()">
                        <!-- populated by js -->
                    </select>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Quantity</label>
                        <input type="number" id="o-qty" required min="1" value="1">
                    </div>
                    <div class="input-group">
                        <label>Unit Price</label>
                        <input type="text" id="o-price" disabled>
                    </div>
                </div>
                <p class="text-sm text-muted mb-2">Note: Order service will publish an event for RabbitMQ to deduct product inventory.</p>
                <button type="submit" class="btn btn-primary w-full mt-2">Place Order</button>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
